name: CI

run-name: CI — ${{ github.ref == 'refs/heads/master' && 'staging' || 'production' }} · ${{ github.event.head_commit.message }}

on:
  push:
    branches: [master]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp check
      - run: vp test

  build-staging:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    environment: staging
    env:
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_FILE_SIZE_LIMIT_MB: ${{ vars.VITE_FILE_SIZE_LIMIT_MB }}
      VITE_CONVEX_URL: ${{ vars.CONVEX_URL }}
      VITE_FEATURE_SIGN_IN: ${{ vars.VITE_FEATURE_SIGN_IN }}
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp build
      - run: vpx fallow health --format badge > dist/badge.svg
      - uses: actions/upload-artifact@v7
        with:
          name: dist-staging
          path: dist

  build-prod:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    env:
      VITE_CONVEX_URL: ${{ vars.CONVEX_URL }}
      VITE_BASE_PATH: ${{ vars.BASE_PATH }}
      VITE_GALLERY_IMAGE_LIMIT: "10"
      VITE_FILE_SIZE_LIMIT_MB: "0.5"
      VITE_FEATURE_SIGN_IN: ${{ vars.FEATURE_SIGN_IN }}
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp build
      - uses: actions/upload-artifact@v7
        with:
          name: dist-prod
          path: dist
