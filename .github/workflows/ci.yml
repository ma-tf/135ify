name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp check
      - run: vp test

  build-staging:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/master'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_FILE_SIZE_LIMIT_MB: ${{ vars.VITE_FILE_SIZE_LIMIT_MB }}
      VITE_CONVEX_URL: ${{ vars.STAGING_CONVEX_URL }}
      VITE_FEATURE_SIGN_IN: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp build
      - run: vpx fallow health --format badge > dist/badge.svg
      - uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist

  build-prod:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      VITE_CONVEX_URL: ${{ vars.PROD_CONVEX_URL }}
      VITE_FILE_SIZE_LIMIT_MB: ${{ vars.VITE_FILE_SIZE_LIMIT_MB }}
      VITE_FEATURE_SIGN_IN: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
      - run: vp i --frozen-lockfile
      - run: vp build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist
