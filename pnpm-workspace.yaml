packages:
  - ".sandcastle"
overrides:
  vite: "catalog:"
  vitest: "catalog:"
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  msgpackr-extract: true
  netlify-cli: true
  sharp: true
  unix-dgram: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3
  - "@netlify/edge-bundler@14.10.3"
  - "@netlify/zip-it-and-ship-it@14.7.1"
  - "@netlify/serverless-functions-api@2.16.0"
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
  vitest: 4.1.9
  "@vitest/coverage-v8": 4.1.9
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
    "@opentelemetry/api": "*"
    "@vitest/browser-preview": "*"
minimumReleaseAgeExclude:
  - vite-plus
  - "@voidzero-dev/*"
  - oxlint
  - "@oxlint/*"
  - oxlint-tsgolint
  - "@oxlint-tsgolint/*"
  - oxfmt
  - "@oxfmt/*"
  - vitest
  - "@vitest/*"
